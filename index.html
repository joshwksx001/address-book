<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Address Book</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 650px;
      margin: 40px auto;
      padding: 0 20px;
      background: #fff;
      color: #222;
    }

    h1 { font-size: 1.4rem; border-bottom: 2px solid #222; padding-bottom: 8px; }
    h2 { font-size: 1rem; margin-top: 24px; }

    label { display: block; margin-top: 8px; font-size: 0.9rem; }
    input  { width: 100%; padding: 7px; margin-top: 3px; box-sizing: border-box; border: 1px solid #ccc; }

    button {
      margin-top: 10px;
      padding: 8px 16px;
      background: #222;
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button:hover { background: #444; }

    table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 0.9rem; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #f5f5f5; }

    .delete-btn {
      background: #c0392b;
      padding: 4px 10px;
      font-size: 0.8rem;
      margin-top: 0;
    }
    .delete-btn:hover { background: #a93226; }

    #message { font-size: 0.85rem; margin-top: 8px; min-height: 18px; }
  </style>
</head>
<body>

<h1>Address Book</h1>

<h2>Add Contact</h2>
<label>Name  <input type="text" id="name"  placeholder="Full name" /></label>
<label>Phone <input type="text" id="phone" placeholder="Phone number" /></label>
<label>Email <input type="text" id="email" placeholder="Email address" /></label>
<button onclick="addContact()">Add Contact</button>
<p id="message"></p>

<h2>Search</h2>
<input type="text" id="search" placeholder="Search by name..." oninput="render()" />

<h2>Contacts</h2>
<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Phone</th>
      <th>Email</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="table-body"></tbody>
</table>

<script>
  var contacts = [];
  var nextId = 1;

  function addContact() {
    var name  = document.getElementById('name').value.trim();
    var phone = document.getElementById('phone').value.trim();
    var email = document.getElementById('email').value.trim();

    if (!name || !phone || !email) {
      showMessage('All fields are required.', '#c0392b');
      return;
    }

    contacts.push({ id: nextId++, name: name, phone: phone, email: email });

    document.getElementById('name').value  = '';
    document.getElementById('phone').value = '';
    document.getElementById('email').value = '';

    showMessage('Contact added successfully.', 'green');
    render();
  }

  function deleteContact(id) {
    contacts = contacts.filter(function(c) { return c.id !== id; });
    render();
  }

  function render() {
    var query = document.getElementById('search').value.trim().toLowerCase();
    var list  = contacts.filter(function(c) {
      return c.name.toLowerCase().includes(query);
    });

    var tbody = document.getElementById('table-body');
    tbody.innerHTML = '';

    if (list.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#888;">No contacts found.</td></tr>';
      return;
    }

    list.forEach(function(c) {
      tbody.innerHTML +=
        '<tr>' +
          '<td>' + c.id    + '</td>' +
          '<td>' + c.name  + '</td>' +
          '<td>' + c.phone + '</td>' +
          '<td>' + c.email + '</td>' +
          '<td><button class="delete-btn" onclick="deleteContact(' + c.id + ')">Delete</button></td>' +
        '</tr>';
    });
  }

  function showMessage(msg, color) {
    var el = document.getElementById('message');
    el.textContent = msg;
    el.style.color = color;
    setTimeout(function() { el.textContent = ''; }, 2500);
  }

  render();
</script>
</body>
</html>
